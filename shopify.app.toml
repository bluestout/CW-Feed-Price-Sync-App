# Learn more about configuring your app at https://shopify.dev/docs/apps/tools/cli/configuration

client_id = "958bc8ab2b25a0b9b267aad022fabf37"
application_url = "https://cw-feed-price-sync-app-production.up.railway.app"
embedded = true
name = "Feed Price Sync"

[access_scopes]
# Learn more at https://shopify.dev/docs/apps/tools/cli/configuration#access_scopes
scopes = "read_products,write_products"

[webhooks]
api_version = "2025-10"

  [[webhooks.subscriptions]]
  uri = "/webhooks/app/uninstalled"
  topics = [ "app/uninstalled" ]

  [[webhooks.subscriptions]]
  uri = "/webhooks/app/scopes_update"
  topics = [ "app/scopes_update" ]

  [[webhooks.subscriptions]]
  uri = "/webhooks/products/update"
  topics = [ "products/update" ]

  [[webhooks.subscriptions]]
  uri = "/webhooks/products/create"
  topics = [ "products/create" ]

[auth]
redirect_urls = [
  "https://cw-feed-price-sync-app-production.up.railway.app/auth/callback",
  "https://cw-feed-price-sync-app-production.up.railway.app/auth/shopify/callback",
  "https://cw-feed-price-sync-app-production.up.railway.app/api/auth/callback"
]

[build]
automatically_update_urls_on_dev = false
